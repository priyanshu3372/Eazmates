<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <defs>
    <linearGradient id="fvGrad" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#7B2FFF"/>
      <stop offset="100%" stop-color="#00D4B8"/>
    </linearGradient>
  </defs>
  <!-- Stylised upward-arrow "E" monogram matching the eazmate. wordmark -->
  <!-- Rounded square background -->
  <rect width="48" height="48" rx="12" fill="url(#fvGrad)"/>
  <!-- Arrow shaft: diagonal bottom-left → top-right -->
  <line x1="14" y1="38" x2="34" y2="10" stroke="white" stroke-width="5" stroke-linecap="round"/>
  <!-- Arrowhead -->
  <polygon points="34,10 22,18 32,22" fill="white"/>
  <!-- Short base stroke for the "z" flavour -->
  <line x1="14" y1="38" x2="26" y2="38" stroke="white" stroke-width="5" stroke-linecap="round"/>
</svg>
